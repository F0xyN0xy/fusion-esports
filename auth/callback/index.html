<!DOCTYPE html>
<html>
<head>
  <title>Fusion Esports - Logging in...</title>
  <style>
    body {
      background: #0A0A0F;
      color: white;
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      text-align: center;
    }
    .logo {
      width: 80px;
      margin-bottom: 20px;
    }
    p {
      color: #ffffff99;
    }
  </style>
</head>
<body>
  <div class="container">
    <p>Logging you in to Fusion Esports...</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');

    if (code) {
      // Redirect back to Flutter app with the code
      window.location.href = `fusionesports://auth?code=${code}`;
    } else {
      document.querySelector('p').textContent = 'Login failed. Please try again.';
    }
  </script>
</body>
</html>
